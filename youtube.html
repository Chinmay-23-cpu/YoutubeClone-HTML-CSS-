<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YoutubeClone.com</title>

    <style>
      .thumbnail-1 {
        width: 300px;
        display: block;
      }
      .search-bar {
        font-size: 20px;
        margin-left: 12px;
        display: block;
      }
      .Video_Title {
        font-size: 18px;
        font-weight: bold;
        width: 300px;
        line-height: 24px;
        margin-top: 0;
        margin-bottom: 5px;
      }
      .Video_stats {
        font-size: 14px;
        color: rgb(96, 96, 96);
        margin-bottom: 0px;
      }
      .Video_auth {
        font-size: 14px;
        color: rgb(96, 96, 96);
        margin-bottom: 0px;
        margin-top: 0;
      }
      .video_preview1 {
        width: 300px;
        display: inline-block;
      }
      .video_preview2 {
        width: 300px;
        display: inline-block;
        vertical-align: top;
        margin-left: 10px;
      }
      .profile-1
      {
        display: inline-block;
        width: 50px;
      }
      .video-info
      {
        display: inline-block;
        width: 200px;
      }
    </style>
  </head>
  <body>
    <input type="text" placeholder="search" class="search-bar" />

    <!-- <p> by default, come with margin at the top and bottom -->
    <div class="video_preview1">
      <div>
        <img class="thumbnail-1" src="/thumbnails/thumbnail-1.webp" />
      </div>
      <div>
        <div class="profile-1">
            <img class="profile-1" src="/profiles/channel-1.jpeg" />
        </div>
        <div class="video-info">
          <p class="Video_Title">
          Talking Tech and AI with Google CEO sundar Pichai!
         </p>

        <p class="Video_auth">Marques Brownlee &#10003;</p>

        <p class="Video_stats">3.4M views &#183; 6 months ago</p>
        </div>
        
      </div>
    </div>

    <div class="video_preview2">
      <img class="thumbnail-1" src="/thumbnails/thumbnail-2.webp" />
      <p class="Video_Title">Try Not To Laugh Challenge#9</p>

      <p class="Video_auth">Markiplier &#10003;</p>

      <p class="Video_stats">19M views &#183; 4 years ago</p>
    </div>
  </body>
</html>
