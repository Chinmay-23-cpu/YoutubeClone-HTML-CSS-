<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YoutubeClone.com</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="youtube.css" />
  </head>

  <body>
    <input type="text" placeholder="search" class="search-bar" />

    <!-- <p> by default, come with margin at the top and bottom -->
    <div class="video_preview1">
      <div class="thumbnail-row">
        <img class="thumbnail-1" src="/thumbnails/thumbnail-1.webp" />
      </div>
      <div>
        <div class="profile-1">
          <img class="profilePic-1" src="/profiles/channel-1.jpeg" />
        </div>
        <div class="video-info">
          <p class="Video_Title">
            Talking Tech and AI with Google CEO sundar Pichai!
          </p>

          <p class="Video_auth">Marques Brownlee &#10003;</p>

          <p class="Video_stats">3.4M views &#183; 6 months ago</p>
        </div>
      </div>
    </div>

    <div class="video_preview2">
      <div class="thumbnail-row">
        <img class="thumbnail-1" src="/thumbnails/thumbnail-2.webp" />
      </div>
      <div>
        <div class="profile-1">
          <img class="profilePic-1" src="/profiles/channel-2.jpeg" />
        </div>
        <div class="video-info">
          <p class="Video_Title">Try Not To Laugh Challenge#9</p>

          <p class="Video_auth">Markiplier &#10003;</p>

          <p class="Video_stats">19M views &#183; 4 years ago</p>
        </div>
      </div>
    </div>
  </body>
</html>
